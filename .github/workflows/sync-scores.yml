name: Sincronizar marcadores en vivo

# Llama al endpoint /api/sync-scores cada 5 minutos para traer los marcadores
# de la fuente externa. Es gratis en repos públicos. El endpoint solo actualiza
# marcador + estado 'live' (nunca finaliza partidos), así que es seguro.
#
# Requiere dos "Repository secrets" (Settings → Secrets and variables → Actions):
#   SYNC_URL    = https://TU-DOMINIO/api/sync-scores
#   SYNC_SECRET = el mismo valor que pusiste en Vercel (env SYNC_SECRET)

# GitHub solo permite cron cada 5 min, así que cada corrida sondea varias
# veces (cada ~55s) para acercarse a "tiempo real". Es gratis en repos públicos.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-scores
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Sondear endpoint de sincronización (~cada 55s)
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$SYNC_SECRET" ]; then
            echo "Faltan los secrets SYNC_URL / SYNC_SECRET — nada que hacer."
            exit 0
          fi
          for i in $(seq 1 5); do
            code=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
              -H "x-sync-key: $SYNC_SECRET" "$SYNC_URL" || echo "000")
            echo "[$i] HTTP $code $(cat /tmp/out.json 2>/dev/null)"
            [ "$i" -lt 5 ] && sleep 55 || true
          done
